<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sukari Spirits &mdash; Enter</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}body{background:#7A2F1E;overflow:hidden}</style>
</head>
<body>
<!-- ===================== THEME B INTRO · PHOENIX RISES FROM EMBERS ===================== -->
<div id="sukari-intro" aria-hidden="true">
  <div class="intro-stage">
    <div class="intro-seed"></div>
    <div class="intro-phoenix-lg" role="img" aria-label="Sukari Spirits"></div>
    <div class="intro-gate">
      <p class="gate-q">Are you 21 or older?</p>
      <div class="gate-btns"><button type="button" class="gate-btn yes" id="gate-yes">Yes</button><button type="button" class="gate-btn no" id="gate-no">No</button></div>
      <p class="gate-fine">You must be of legal drinking age to enter this site.</p>
    </div>
    <div class="intro-denied">
      <p class="denied-h">Access Denied</p>
      <p class="denied-p">You must be of legal drinking age to enter this site.</p>
    </div>
    <span class="ember e1"></span><span class="ember e2"></span><span class="ember e3"></span><span class="ember e4"></span>
    <span class="ember e5"></span><span class="ember e6"></span><span class="ember e7"></span><span class="ember e8"></span>
  </div>
</div>
<style>
  #sukari-intro{position:fixed;inset:0;z-index:9999;overflow:hidden;
    background:radial-gradient(900px 760px at 50% 60%,#9A3B22 0%,#7A2F1E 50%,#511D11 100%);
    }
  #sukari-intro.go{animation:si-out .85s cubic-bezier(.6,0,.3,1) forwards}
  #sukari-intro .intro-stage{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:18px}
  #sukari-intro .intro-seed{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);width:34vh;height:54vh;border-radius:50%;opacity:0;pointer-events:none;
    background:radial-gradient(closest-side,rgba(248,217,142,.6),rgba(224,115,90,.28) 46%,transparent 72%);filter:blur(8px);
    animation:seed 2.6s ease .2s forwards}
  #sukari-intro .intro-phoenix-lg{width:auto;height:54vh;aspect-ratio:1/1;opacity:0;
    background:url(images/logo-lockup-gold-v2.png) center/contain no-repeat;
    animation:phoenix-form 2.1s cubic-bezier(.2,.66,.2,1) .4s forwards}
  #sukari-intro .intro-wm{font-family:"Bricolage Grotesque",system-ui,sans-serif;font-weight:700;color:#F6E4C6;font-size:2.5rem;line-height:1;letter-spacing:-.012em;opacity:0;
    text-shadow:0 0 24px rgba(232,180,104,.5);animation:wm-in .9s ease 2.2s forwards}
  #sukari-intro .intro-wm span{display:block;font-weight:600;font-size:.6rem;letter-spacing:.42em;text-transform:uppercase;color:#E8B468;margin-top:11px;text-align:center}
  #sukari-intro .ember{position:absolute;left:50%;bottom:26%;width:4px;height:4px;border-radius:50%;background:radial-gradient(circle,#F9DC92,#E0735A);opacity:0;animation:ember-rise 2.3s ease forwards}
  #sukari-intro .e1{--x:-78px;animation-delay:.3s}
  #sukari-intro .e2{--x:54px;width:3px;height:3px;animation-delay:.55s}
  #sukari-intro .e3{--x:-34px;animation-delay:.8s}
  #sukari-intro .e4{--x:84px;width:3px;height:3px;animation-delay:.45s}
  #sukari-intro .e5{--x:18px;animation-delay:1.05s}
  #sukari-intro .e6{--x:-56px;width:3px;height:3px;animation-delay:.95s}
  #sukari-intro .e7{--x:40px;animation-delay:.7s}
  #sukari-intro .e8{--x:-16px;width:3px;height:3px;animation-delay:1.2s}
  @keyframes seed{0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}25%{opacity:1}60%{opacity:.85;transform:translate(-50%,-50%) scale(1.06)}100%{opacity:.28;transform:translate(-50%,-50%) scale(1)}}
  @keyframes phoenix-form{
    0%{opacity:0;transform:scale(.78) translateY(24px);filter:blur(30px) drop-shadow(0 0 50px rgba(224,115,90,.65))}
    34%{opacity:1}
    64%{filter:blur(0) drop-shadow(0 0 92px rgba(248,222,150,.85))}
    100%{opacity:1;transform:scale(1) translateY(0);filter:blur(0) drop-shadow(0 0 52px rgba(244,211,142,.62))}}
  @keyframes ember-rise{0%{opacity:0;transform:translate(0,0) scale(1)}20%{opacity:.95}100%{opacity:0;transform:translate(var(--x),-210px) scale(.3)}}
  @keyframes wm-in{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes si-out{to{opacity:0;visibility:hidden;transform:scale(1.06)}}
  @media(prefers-reduced-motion:reduce){#sukari-intro *{animation-duration:.01s!important}#sukari-intro .intro-phoenix-lg{opacity:1;transform:none;filter:none}#sukari-intro .intro-wm{opacity:1}}

  #sukari-intro .intro-gate{margin-top:20px;opacity:0;text-align:center;animation:gate-in .7s ease 2.7s forwards;z-index:5}
  #sukari-intro .gate-q{font-family:"Bricolage Grotesque",system-ui,sans-serif;font-weight:600;color:#F4E2C4;font-size:1.3rem;margin-bottom:20px}
  #sukari-intro .gate-btns{display:flex;gap:16px;justify-content:center}
  #sukari-intro .gate-btn{cursor:pointer;font-family:"Bricolage Grotesque",sans-serif;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.18em;padding:13px 38px;border-radius:2px;transition:.25s}
  #sukari-intro .gate-btn.yes{background:#E0735A;color:#3a160d;border:1px solid #E0735A}
  #sukari-intro .gate-btn.yes:hover{background:transparent;color:#E0735A}
  #sukari-intro .gate-btn.no{background:transparent;color:#F4E2C4;border:1px solid rgba(232,180,104,.45)}
  #sukari-intro .gate-btn.no:hover{border-color:#E8B468;color:#E8B468}
  #sukari-intro .gate-fine{margin-top:18px;font-size:.7rem;letter-spacing:.03em;color:rgba(244,226,196,.6)}
  #sukari-intro .intro-denied{display:none;text-align:center;padding:0 24px;z-index:6}
  #sukari-intro.denied .intro-stage>:not(.intro-denied){display:none}
  #sukari-intro.denied .intro-denied{display:block;animation:gate-in .55s ease forwards}
  #sukari-intro .denied-h{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;color:#E0735A;font-size:clamp(2.2rem,6vw,3.6rem);letter-spacing:.02em;text-transform:uppercase;margin-bottom:16px}
  #sukari-intro .denied-p{font-family:"Newsreader",Georgia,serif;color:rgba(244,226,196,.78);font-size:1.05rem;max-width:26em;margin:0 auto;line-height:1.5}
  @keyframes gate-in{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
</style>
<script>(function(){var ov=document.getElementById('sukari-intro');if(!ov)return;var y=document.getElementById('gate-yes'),n=document.getElementById('gate-no');if(y)y.addEventListener('click',function(){ov.classList.add('go');setTimeout(function(){location.href='mockup2-home.html'},850)});if(n)n.addEventListener('click',function(){ov.classList.add('denied')})})();</script>
</body>
</html>
