<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sukari Spirits &mdash; Enter</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}body{background:#F2F4EF;overflow:hidden}</style>
</head>
<body>
<!-- ===================== THEME C INTRO · PHOENIX SCANNED INTO BEING ===================== -->
<div id="sukari-intro" aria-hidden="true">
  <div class="intro-grid"></div>
  <div class="intro-stage">
    <div class="intro-scan"></div>
    <div class="intro-phoenix-lg" role="img" aria-label="Sukari Spirits"></div>
    <div class="intro-gate">
      <p class="gate-q">Are you 21 or older?</p>
      <div class="gate-btns"><button type="button" class="gate-btn yes" id="gate-yes">Yes</button><button type="button" class="gate-btn no" id="gate-no">No</button></div>
      <p class="gate-fine">You must be of legal drinking age to enter this site.</p>
    </div>
    <div class="intro-denied">
      <p class="denied-h">Access Denied</p>
      <p class="denied-p">You must be of legal drinking age to enter this site.</p>
    </div>
  </div>
</div>
<style>
  #sukari-intro{position:fixed;inset:0;z-index:9999;overflow:hidden;display:grid;place-items:center;
    background:radial-gradient(120% 90% at 50% 42%,#FBFCFA 0%,#F2F4EF 56%,#E5EAE0 100%);
    }
  #sukari-intro.go{animation:si-out .85s cubic-bezier(.6,0,.3,1) forwards}
  #sukari-intro .intro-grid{position:absolute;inset:0;pointer-events:none;opacity:0;
    background-image:linear-gradient(#CDD5C8 1px,transparent 1px),linear-gradient(90deg,#CDD5C8 1px,transparent 1px);
    background-size:46px 46px;
    -webkit-mask:radial-gradient(58% 50% at 50% 46%,#000,transparent 76%);mask:radial-gradient(58% 50% at 50% 46%,#000,transparent 76%);
    animation:grid-in .8s ease .1s forwards}
  #sukari-intro .intro-stage{position:relative;width:min(420px,82vw);height:78vh;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px}
  #sukari-intro .intro-phoenix-lg{width:auto;height:54vh;aspect-ratio:1/1;opacity:0;
    background:url(images/logo-lockup-gold-v2.png) center/contain no-repeat;
    filter:drop-shadow(0 10px 18px rgba(31,48,36,.18));
    clip-path:inset(0 0 100% 0);
    animation:phoenix-scan 1.7s cubic-bezier(.3,.55,.3,1) .5s forwards, phoenix-fade .5s ease .5s forwards}
  #sukari-intro .intro-scan{position:absolute;top:9%;left:50%;transform:translateX(-50%);width:46vh;max-width:300px;height:2px;opacity:0;
    background:linear-gradient(90deg,transparent,#C9583F 50%,transparent);box-shadow:0 0 12px rgba(201,88,63,.6);
    animation:scan 1.6s cubic-bezier(.3,.55,.3,1) .5s forwards}
  #sukari-intro .intro-fig{position:absolute;top:8%;left:9%;font-family:"Spline Sans Mono",ui-monospace,monospace;
    font-size:11px;letter-spacing:.16em;color:#5C6A5E;opacity:0;animation:tag-in .5s ease 1.5s forwards}
  #sukari-intro .intro-wm{font-family:"Space Grotesk",system-ui,sans-serif;font-weight:500;color:#1F3024;font-size:2.4rem;line-height:1;letter-spacing:-.02em;opacity:0;
    animation:wm-in .9s ease 2.1s forwards}
  #sukari-intro .intro-wm span{display:block;font-family:"Spline Sans Mono",ui-monospace,monospace;font-size:.58rem;
    font-weight:500;letter-spacing:.34em;text-transform:uppercase;color:#B89247;margin-top:11px;text-align:center}
  @keyframes grid-in{to{opacity:.55}}
  @keyframes phoenix-scan{0%{clip-path:inset(0 0 100% 0)}100%{clip-path:inset(0 0 0 0)}}
  @keyframes phoenix-fade{0%{opacity:0}100%{opacity:1}}
  @keyframes scan{0%{top:9%;opacity:0}12%{opacity:.9}86%{opacity:.9}100%{top:64%;opacity:0}}
  @keyframes tag-in{to{opacity:.85}}
  @keyframes wm-in{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes si-out{to{opacity:0;visibility:hidden}}
  @media(prefers-reduced-motion:reduce){#sukari-intro *{animation-duration:.01s!important}#sukari-intro .intro-phoenix-lg{opacity:1;clip-path:none}#sukari-intro .intro-wm{opacity:1}}

  #sukari-intro .intro-gate{margin-top:20px;opacity:0;text-align:center;animation:gate-in .7s ease 2.7s forwards;z-index:5}
  #sukari-intro .gate-q{font-family:"Space Grotesk",system-ui,sans-serif;font-weight:500;color:#1F3024;font-size:1.3rem;margin-bottom:20px}
  #sukari-intro .gate-btns{display:flex;gap:16px;justify-content:center}
  #sukari-intro .gate-btn{cursor:pointer;font-family:"Spline Sans Mono",ui-monospace,monospace;font-size:.74rem;font-weight:500;text-transform:uppercase;letter-spacing:.14em;padding:13px 38px;border-radius:2px;transition:.25s}
  #sukari-intro .gate-btn.yes{background:#E0735A;color:#fff;border:1px solid #E0735A}
  #sukari-intro .gate-btn.yes:hover{background:transparent;color:#C9583F}
  #sukari-intro .gate-btn.no{background:transparent;color:#1F3024;border:1px solid #CDD5C8}
  #sukari-intro .gate-btn.no:hover{border-color:#E0735A;color:#C9583F}
  #sukari-intro .gate-fine{margin-top:18px;font-family:"Spline Sans Mono",ui-monospace,monospace;font-size:.66rem;letter-spacing:.06em;color:#5C6A5E}
  #sukari-intro .intro-denied{display:none;text-align:center;padding:0 24px;z-index:6}
  #sukari-intro.denied .intro-stage>:not(.intro-denied){display:none}
  #sukari-intro.denied .intro-denied{display:block;animation:gate-in .55s ease forwards}
  #sukari-intro .denied-h{font-family:"Space Grotesk",sans-serif;font-weight:600;color:#C9583F;font-size:clamp(2.2rem,6vw,3.6rem);letter-spacing:.01em;text-transform:uppercase;margin-bottom:16px}
  #sukari-intro .denied-p{font-family:"Hanken Grotesk",system-ui,sans-serif;color:#5C6A5E;font-size:1.05rem;max-width:26em;margin:0 auto;line-height:1.5}
  @keyframes gate-in{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
</style>
<script>(function(){var ov=document.getElementById('sukari-intro');if(!ov)return;var y=document.getElementById('gate-yes'),n=document.getElementById('gate-no');if(y)y.addEventListener('click',function(){ov.classList.add('go');setTimeout(function(){location.href='mockup3-home.html'},850)});if(n)n.addEventListener('click',function(){ov.classList.add('denied')})})();</script>
</body>
</html>
