<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sukari Spirits &mdash; Enter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gloock&family=Hanken+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}body{background:#3A0D18;overflow:hidden}</style>
</head>
<body>
<!-- ===================== THEME A INTRO · LOGO MATERIALIZES WITH SPARKLE ===================== -->
<div id="sukari-intro" aria-hidden="true">
  <svg class="intro-spine" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
    <path class="curve" d="M 890,760 L 890,751 L 890,742 L 890,733 L 890,724 L 890,715 L 890,706 L 890,697 L 891,688 L 891,679 L 891,670 L 891,661 L 892,652 L 892,644 L 892,635 L 892,626 L 892,617 L 892,608 L 892,599 L 892,590 L 893,581 L 893,572 L 893,563 L 893,554 L 894,545 L 894,536 L 895,527 L 892,518 L 868,509 L 839,500 L 812,491 L 791,482 L 782,473 L 780,464 L 778,455 L 777,446 L 777,437 L 777,428 L 776,419 L 776,411 L 776,402 L 776,393 L 776,384 L 776,375 L 776,366 L 776,357 L 776,348 L 776,339 L 776,330 L 777,321 L 777,312 L 776,303 L 776,294 L 776,285 L 775,276 L 775,267 L 775,258 L 774,249 L 774,240 L 774,231 L 774,222 L 778,213 L 779,204 L 779,195 L 780,186 L 780,178 L 780,169 L 779,160 L 776,151 L 777,142 L 777,133 L 777,124 L 777,115 L 777,106 L 777,97 L 776,88 L 772,79 L 759,70 L 679,70 L 666,79 L 662,88 L 660,97 L 660,106 L 660,115 L 660,124 L 660,133 L 660,142 L 661,151 L 659,160 L 658,169 L 658,178 L 658,186 L 657,195 L 657,204 L 658,213 L 660,222 L 662,231 L 662,240 L 662,249 L 662,258 L 662,267 L 662,276 L 661,285 L 661,294 L 660,303 L 660,312 L 660,321 L 660,330 L 660,339 L 660,348 L 660,357 L 659,366 L 658,375 L 658,384 L 658,393 L 658,402 L 657,411 L 655,419 L 651,428 L 628,437 L 599,446 L 576,455 L 559,464 L 546,473 L 545,482 L 545,491 L 545,500 L 546,509 L 546,518 L 546,527 L 546,536 L 547,545 L 547,554 L 548,563 L 548,572 L 548,581 L 549,590 L 549,599 L 550,608 L 550,617 L 550,626 L 550,635 L 550,644 L 550,652 L 551,661 L 551,670 L 551,679 L 552,688 L 552,697 L 553,706 L 553,715 L 553,724 L 553,733 L 553,742 L 553,751 L 554,760"/>
  </svg>
  <div class="intro-stage">
    <div class="intro-seed"></div>
    <div class="intro-logo-full" role="img" aria-label="Sukari Spirits"></div>
    <span class="spark s1"></span><span class="spark s2"></span><span class="spark s3"></span><span class="spark s4"></span>
    <span class="spark s5"></span><span class="spark s6"></span><span class="spark s7"></span><span class="spark s8"></span>
    <div class="intro-gate">
      <p class="gate-q">Are you 21 or older?</p>
      <div class="gate-btns"><button type="button" class="gate-btn yes" id="gate-yes">Yes</button><button type="button" class="gate-btn no" id="gate-no">No</button></div>
      <p class="gate-fine">You must be of legal drinking age to enter this site.</p>
    </div>
    <div class="intro-denied">
      <p class="denied-h">Access Denied</p>
      <p class="denied-p">You must be of legal drinking age to enter this site.</p>
    </div>
  </div>
</div>
<style>
  #sukari-intro{position:fixed;inset:0;z-index:9999;overflow:hidden;
    background:radial-gradient(1100px 820px at 50% 46%,#4a1422 0%,#3A0D18 56%,#270811 100%)}
  #sukari-intro.go{animation:si-out .85s cubic-bezier(.6,0,.3,1) forwards}
  #sukari-intro .intro-spine{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  #sukari-intro .intro-spine .curve{fill:none;stroke:rgba(201,162,75,.62);stroke-width:1.9;vector-effect:non-scaling-stroke;
    stroke-dasharray:3400;stroke-dashoffset:3400;animation:curve-draw 2.0s cubic-bezier(.5,0,.1,1) .2s forwards}
  #sukari-intro .intro-spine .coral{stroke:rgba(224,115,90,.55)}
  #sukari-intro .intro-stage{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px}
  #sukari-intro .intro-seed{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);width:40vh;height:46vh;border-radius:50%;opacity:0;pointer-events:none;
    background:radial-gradient(closest-side,rgba(255,236,180,.55),rgba(224,115,90,.22) 46%,transparent 72%);filter:blur(10px);
    animation:seed 2.6s ease .2s forwards}
  #sukari-intro .intro-logo-full{width:auto;height:48vh;aspect-ratio:1/1;opacity:0;
    background:url(images/logo-lockup-gold-v2.png) center/contain no-repeat;
    animation:logo-form 2.1s cubic-bezier(.2,.66,.2,1) .4s forwards}
  #sukari-intro .spark{position:absolute;width:15px;height:15px;background:linear-gradient(#FFF6D6,#F0CE78);
    clip-path:polygon(50% 0,58% 42%,100% 50%,58% 58%,50% 100%,42% 58%,0 50%,42% 42%);
    opacity:0;filter:drop-shadow(0 0 7px rgba(255,236,170,.95));pointer-events:none;z-index:4}
  #sukari-intro .s1{top:22%;left:42%;animation:tw 1.5s ease 1.0s 2 alternate}
  #sukari-intro .s2{top:30%;left:60%;width:11px;height:11px;animation:tw 1.7s ease 1.5s infinite alternate}
  #sukari-intro .s3{top:50%;left:34%;width:10px;height:10px;animation:tw 1.4s ease 1.3s 2 alternate}
  #sukari-intro .s4{top:38%;left:64%;animation:tw 1.6s ease 1.8s infinite alternate}
  #sukari-intro .s5{top:62%;left:40%;width:9px;height:9px;animation:tw 1.5s ease 2.0s 2 alternate}
  #sukari-intro .s6{top:26%;left:55%;width:8px;height:8px;animation:tw 1.3s ease 2.2s infinite alternate}
  #sukari-intro .s7{top:56%;left:62%;width:12px;height:12px;animation:tw 1.6s ease 1.2s 2 alternate}
  #sukari-intro .s8{top:46%;left:30%;width:8px;height:8px;animation:tw 1.4s ease 2.4s infinite alternate}
  #sukari-intro .intro-gate{margin-top:18px;opacity:0;text-align:center;animation:gate-in .7s ease 2.7s forwards;z-index:5}
  #sukari-intro .gate-q{font-family:"Gloock",Georgia,serif;color:#EAD0BE;font-size:1.35rem;margin-bottom:20px}
  #sukari-intro .gate-btns{display:flex;gap:16px;justify-content:center}
  #sukari-intro .gate-btn{cursor:pointer;font-family:"Hanken Grotesk",sans-serif;font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.2em;padding:13px 38px;border-radius:2px;transition:.25s}
  #sukari-intro .gate-btn.yes{background:#E0735A;color:#360c16;border:1px solid #E0735A}
  #sukari-intro .gate-btn.yes:hover{background:transparent;color:#E0735A}
  #sukari-intro .gate-btn.no{background:transparent;color:#EAD0BE;border:1px solid rgba(201,162,75,.42)}
  #sukari-intro .gate-btn.no:hover{border-color:#C9A24B;color:#C9A24B}
  #sukari-intro .gate-fine{margin-top:18px;font-size:.7rem;letter-spacing:.03em;color:rgba(234,208,190,.55)}
  #sukari-intro .intro-denied{display:none;text-align:center;padding:0 24px;z-index:6}
  #sukari-intro.denied .intro-stage>:not(.intro-denied){display:none}
  #sukari-intro.denied .intro-denied{display:block;animation:gate-in .55s ease forwards}
  #sukari-intro.denied .intro-spine{opacity:.22}
  #sukari-intro .denied-h{font-family:"Gloock",Georgia,serif;color:#E0735A;font-size:clamp(2.2rem,6vw,3.6rem);letter-spacing:.04em;text-transform:uppercase;margin-bottom:16px}
  #sukari-intro .denied-p{font-family:"Hanken Grotesk",sans-serif;color:rgba(234,208,190,.72);font-size:1.05rem;max-width:26em;margin:0 auto;line-height:1.5}
  @keyframes curve-draw{to{stroke-dashoffset:0}}
  @keyframes seed{0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}25%{opacity:1}60%{opacity:.85;transform:translate(-50%,-50%) scale(1.05)}100%{opacity:.3;transform:translate(-50%,-50%) scale(1)}}
  @keyframes logo-form{0%{opacity:0;transform:scale(.82) translateY(14px);filter:blur(26px) drop-shadow(0 0 50px rgba(224,115,90,.6))}32%{opacity:1}64%{filter:blur(0) drop-shadow(0 0 90px rgba(255,240,190,.85))}100%{opacity:1;transform:scale(1) translateY(0);filter:blur(0) drop-shadow(0 0 46px rgba(245,214,128,.6))}}
  @keyframes tw{0%{opacity:0;transform:scale(.2) rotate(0)}50%{opacity:1;transform:scale(1) rotate(20deg)}100%{opacity:0;transform:scale(.25) rotate(0)}}
  @keyframes gate-in{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes si-out{to{opacity:0;visibility:hidden;transform:scale(1.06)}}
  @media(prefers-reduced-motion:reduce){#sukari-intro *{animation-duration:.01s!important}#sukari-intro .intro-logo-full{opacity:1;transform:none;filter:none}#sukari-intro .spark{display:none}}
</style>
<script>(function(){var ov=document.getElementById('sukari-intro');if(!ov)return;var y=document.getElementById('gate-yes'),n=document.getElementById('gate-no');if(y)y.addEventListener('click',function(){ov.classList.add('go');setTimeout(function(){location.href='mockup1-home.html'},850)});if(n)n.addEventListener('click',function(){ov.classList.add('denied')})})();</script>
</body>
</html>
